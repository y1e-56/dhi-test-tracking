services:
  - type: static
    name: dhi-test-tracking-app
    env: static
    region: frankfurt
    rootDir: DHI-LOGICEL
    buildCommand: npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://dhi-test-tracking-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: dhi-test-tracking-api
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dhi-test-tracking-db
          property: connectionString
      - key: JWT_SECRET
        value: dhi-test-tracking-local-secret-2024
      - key: CORS_ORIGIN
        value: dev
      - key: CORS_ORIGINS
        value: https://dhi-test-tracking.onrender.com
      - key: APP_URL
        value: https://dhi-test-tracking.onrender.com
      - key: PORT
        value: "10000"

databases:
  - name: dhi-test-tracking-db
    region: frankfurt
    plan: free
    databaseName: dhi_test_tracking
