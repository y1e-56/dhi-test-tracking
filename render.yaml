services:
  - type: web
    name: dhi-test-tracking-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dhi-test-tracking-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      - key: RESEND_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: "DHI Test Tracking <onboarding@resend.dev>"

  - type: static
    name: dhi-test-tracking-app
    env: static
    region: frankfurt
    buildCommand: npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        fromService:
          name: dhi-test-tracking-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: dhi-test-tracking-db
    region: frankfurt
    plan: free
    databaseName: dhi_test_tracking
